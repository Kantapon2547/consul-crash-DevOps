global:
  name: consul
  datacenter: dc1
  # Remove specific image versions - let the modern chart pick the right ones
  tls:
    enabled: true
  gke:
    enabled: true

server:
  replicas: 1
  bootstrapExpect: 1
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

connectInject:
  enabled: true
  # This setting tells the NEW chart to ignore the old Alpha APIs
  apiGateway:
    manageExternalCRDs: false
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Turn off the Mesh Gateway to keep GKE Autopilot happy
meshGateway:
  enabled: false

ui:
  enabled: true
  service:
    enabled: true  # <--- THIS IS THE MISSING KEY
    type: LoadBalancer