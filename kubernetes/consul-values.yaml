global:
  name: consul
  datacenter: dc1
  tls:
    enabled: true
  gke:
    enabled: true

server:
  replicas: 1
  bootstrapExpect: 1
  # GKE Autopilot requires these minimums for Anti-Affinity
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

connectInject:
  enabled: true
  apiGateway:
    manageExternalCRDs: false
  # The injector also needs enough resources for Autopilot
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

meshGateway:
  enabled: false

ui:
  enabled: true
  service:
    type: LoadBalancer